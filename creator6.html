<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/styles.css">
    <title>Model of information threats</title>
</head>
<body class = 'page'>
    <nav class = 'nav-bar'>
        <a class = "nav-bar__title" href = 'homePage.html'>Model of information threats</a>
        <a class = 'nav-bar__link' href = 'creator1.html'>Create a model</a>
        <a class = 'nav-bar__link nav-bar__link_account' href = 'account.html'>Account</a>
    </nav>
    <div class = 'constructor'>
        <div class = 'progress'>
            <h3 class = 'progress__title'>Определение актуальных нарушителей</h3>
            <div class = 'progress__image' style="background-image: url(images/step6.png)"></div>
        </div>
        <form class = 'form'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <label for='intruderCategory' class = 'form__label'>Категория нарушителя:</label>
                    <input type='text' id='intruderCategory' name='intruderCategory' class = 'form__input' placeholder="Введите категорию нарушителя" required>
                </div>
                <div style="display: flex; flex-direction: column">
                    <label for='intruderPossibility' class = 'form__label'>Возможность нарушителя:</label>
                    <input type='text' id='intruderPossibility' name='intruderPossibility' class = 'form__input' placeholder="Введите возможность нарушителя" required>
                </div>
                <div style="display: flex; flex-direction: column">
                    <label for='intruderTarget' class = 'form__label'>Цель нарушителя:</label>
                    <input type='text' id='intruderTarget' name='intruderTarget' class = 'form__input' placeholder="Введите цель нарушителя" required>
                </div>
            </div>
            <button type='submit' class = 'form__button'>Отправить</button>
        </form>
        <div class = 'output'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <p class = 'output__item'>Актуальные нарушители:</p>
                    <table>
                        <tr style="border: 1px solid black">
                            <td style="border: 1px solid black">Категория нарушителя</td>
                            <td style="border: 1px solid black">Возможность нарушителя</td>
                            <td style="border: 1px solid black">Цель нарушителя</td>
                        </tr>
                        <tr style="border: 1px solid black" id = table>
                            <td style="border: 1px solid black" id = 'actualIntruderCategory'></td>
                            <td style="border: 1px solid black" id='actualIntruderPossibility'></td>
                            <td style="border: 1px solid black" id='actualIntruderTarget'></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-around">
            <a class = 'continue-link' href="creator5.html">← Предыдущий этап</a>
            <a class = 'continue-link' href="creator7.html">Следующий этап →</a>
        </div>
    </div>
    <footer class = 'footer' style="margin-top: auto">
        <p class = 'footer__copyright'>&copy; 2023 Beastoloch</p>
    </footer>
    <script src = './scripts/creator6.js'></script>
</body>
</html>
