<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/styles.css">
    <title>Model of information threats</title>
</head>
<body class = 'page'>
    <nav class = 'nav-bar'>
        <a class = "nav-bar__title" href = 'homePage.html'>Model of information threats</a>
        <a class = 'nav-bar__link' href = 'creator1.html'>Create a model</a>
        <a class = 'nav-bar__link nav-bar__link_account' href = 'account.html'>Account</a>
    </nav>
    <div class = 'constructor'>
        <div class = 'progress'>
            <h3 class = 'progress__title'>Термины и определения</h3>
            <div class = 'progress__image' style="background-image: url(images/step2.png)"></div>
        </div>
        <form class = 'form'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <label for='definition' class = 'form__label'>Термин:</label>
                    <input type='text' id='definition' name='definition' class = 'form__input' placeholder="Введите термин" required>
                </div>
            </div>
            <button type='submit' class = 'form__button'>Отправить</button>
        </form>
        <div class = 'output'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <p class = 'output__item'>Значение термина:</p>
                    <p class = 'output__box'></p>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-around">
            <a class = 'continue-link' href="creator1.html">← Предыдущий этап</a>
            <a class = 'continue-link' href="creator3.html">Следующий этап →</a>
        </div>
    </div>
    <footer class = 'footer' style="margin-top: auto">
        <p class = 'footer__copyright'>&copy; 2023 Beastoloch</p>
    </footer>
    <script src = './scripts/creator2.js'></script>
</body>
</html>
