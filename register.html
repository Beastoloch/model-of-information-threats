<body class = 'page'>

    <div class = "authorization">
        <h2 class = "authorization__title">Registration</h2>
        <form method="post" class = "authorization__form">

            <input class = "authorization__input" type="password" name="repeatPassword" id ='repeatPassword' placeholder="Repeat password" required>
            <button type="submit" class="authorization__button">Sign up</button>
            <h3 id = 'error'></h3>
        </form>
    </div>
    <footer class = 'footer' style="margin-top: auto">
