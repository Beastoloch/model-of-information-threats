<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/styles.css">
    <title>Model of information threats</title>
</head>
<body class = 'page'>
    <nav class = 'nav-bar'>
        <a class = "nav-bar__title" href = 'homePage.html'>Model of information threats</a>
        <a class = 'nav-bar__link' href = 'creator1.html'>Create a model</a>
        <a class = 'nav-bar__link nav-bar__link_account' href = 'account.html''>Account</a>
    </nav>
    <div class = 'constructor'>
        <div class = 'progress'>
            <h3 class = 'progress__title'>Описание систем и сетей</h3>
            <div class = 'progress__image' style="background-image: url(images/step3.png)"></div>
        </div>
        <form class = 'form'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <label for='informationType' class = 'form__label'>Вид информации:</label>
                    <input type='text' id='informationType' name='informationType' class = 'form__input' placeholder="Введите вид информации" required>
                </div>
                <div style="display: flex; flex-direction: column">
                    <label for='role' class = 'form__label'>Роли пользователей:</label>
                    <input type='text' id='role' name='role' class = 'form__input' placeholder="Введите роль пользователя" required>
                </div>
            </div>
            <button type='submit' class = 'form__button'>Отправить</button>
        </form>
        <div class = 'output'>
            <div style="display: flex; flex-direction: row; gap: 3rem">
                <div style="display: flex; flex-direction: column">
                    <p class = 'output__item' id='firstOutputBox'>Перечень информации:</p>
                    <p class = 'output__box'></p>
                </div>
                <div style="display: flex; flex-direction: column">
                    <p class = 'output__item'>Разрешенные действия:</p>
                    <p class = 'output__box' id='secondOutputBox'></p>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-around">
            <a class = 'continue-link' href="creator2.html">← Предыдущий этап</a>
            <a class = 'continue-link' href="creator4.html">Следующий этап →</a>
        </div>
    </div>
    <footer class = 'footer' style="margin-top: auto">
        <p class = 'footer__copyright'>&copy; 2023 Beastoloch</p>
    </footer>
    <script src = './scripts/creator3.js'></script>
</body>
</html>
